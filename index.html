<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desired Layout</title>
    <style>
        body {
            padding: 5px;
            font-family: Montserrat, sans-serif;
        }
        .desktop-navigation {
            display: grid;
            grid-template-columns: 1fr 3fr; /* Left column for logo, right for content */
            grid-template-rows: 2fr 1fr; /* Right sections stacked */
            gap: 1px;
            max-width: 1200px;
            margin: 0 auto;
            /*border: 1px solid #000;*/
        }
        .Logo-section {
            display: flex;
            align-items: center;
            justify-content: center;
            grid-column: 1;
            grid-row: 1 / span 2;
            /*border: 1px solid #000;p*/
        }
        .logo img {
            max-height: 100px;
            margin-right: 10px;
        }
        .language-donate-section {
            grid-column: 2; /* Ensure it's in the right column */
            grid-row: 1; /* Top right */
            /*border: 1px solid #000;*/
            display: flex;
            justify-content: flex-end; /* Aligns content to the right */
            align-items: center; /* Vertically aligns content */
            padding: 10px;
        }
        .language-section {
            display: flex;
            align-items: center;
            gap: 10px; /* Adds spacing between elements */
        }
        .languages {
            display: flex;
            gap: 5px; /* Adds spacing between language links */
        }
        .languages a {
            text-decoration: none;
            color: #2d2d2d;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .languages a:hover {
            text-decoration: underline;
        }
        .donate-button {
            border-radius: 4px;
            color: #fff; /* Text color for readability */
            font-size: 19px;
            font-family: 'Roboto Condensed', sans-serif;
            padding: 10px 20px;
            text-decoration: none;
            background-image: 
                radial-gradient(ellipse farthest-corner at right bottom, #0F8A8C 0%, #0F8A8C 8%, #0F8A8C 30%, #0F8A8C 40%, transparent 80%),
                radial-gradient(ellipse farthest-corner at left top, #032E3B 8%, #032E3B 25%, #032E3B 62.5%, #0F8A8C 100%);
            background-size: cover; /* Ensures the gradient covers the button */
            background-repeat: no-repeat; /* Avoids repeating the gradient */
            border: none; /* Removes default border */
            cursor: pointer; /* Changes cursor on hover */
            transition: background-color 0.3s ease; /* Smooth transition on hover */
        }
        .donate-button:hover {
            opacity: 0.9; /* Slight transparency effect on hover */
        }

        .menu-section {
            grid-column: 2; /* Right column */
            grid-row: 2; /* Bottom right */
           /* border: 1px solid #000;*/
        }
        .nav-links {
            list-style: none;
            display: flex;
            justify-content: flex-end;
            margin: 0;
            padding: 0;
        }
        .nav-links li {
            margin: 0 15px;
        }
        .nav-links a {
            text-decoration: none;
            color: #2d2d2d;
            font-size: 20px;
            font-weight: bold;
        }
        .nav-links a:hover {
            text-decoration: underline;
        }
        @media (max-width: 768px) {
            .navigation-bar {
                grid-template-columns: 1fr; /* Single column layout */
                grid-template-rows: auto auto auto;
            }
            .language-section {
                flex-direction: column;
                align-items: flex-start;
            }
            .languages, .donate-button {
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="desktop-navigation">
        <div class="Logo-section">
            <div class="logo">
                <img src="./test.png"alt="OKM Logo">
            </div>
        </div>
        <div class="language-donate-section">
            <div class="language-section">
                <div class="languages">
                    <a href="#">POLISH</a> | 
                    <a href="#">ENGLISH</a> | 
                    <a href="#">ARABIC</a> | 
                    <a href="#">RUSSIAN</a>
                </div>
                <a href="#" class="donate-button">Donate</a>
            </div>
        </div>
        <div class="menu-section">
            <ul class="nav-links">
                <li><a href="#">Visit the Center</a></li>
                <li><a href="#">For Educators</a></li>
                <li><a href="#">Support Our Center</a></li>
                <li><a href="#">Events</a></li>
                <li><a href="#">About Us</a></li>
            </ul>
        </div>
    </div>
</body>
</html>
